name: Frontend CI

on:
  pull_request:
    paths:
      - "app/**"
      - "components/**"
      - "hooks/**"
      - "lib/**"
      - "public/**"
      - "styles/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "next.config.mjs"
      - "tailwind.config.js"
      - "postcss.config.mjs"
      - "components.json"
      - "Provider.jsx"
      - "AvaxConnectButton.jsx"
      - ".github/workflows/frontend.yml"
  push:
    branches:
      - main
      - develop
    paths:
      - "app/**"
      - "components/**"
      - "hooks/**"
      - "lib/**"
      - "public/**"
      - "styles/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "next.config.mjs"
      - "tailwind.config.js"
      - "postcss.config.mjs"
      - "components.json"
      - "Provider.jsx"
      - "AvaxConnectButton.jsx"
      - ".github/workflows/frontend.yml"

permissions:
  contents: read

concurrency:
  group: frontend-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Lint, Typecheck, Test, Build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint --if-present

      - name: Type check
        if: ${{ hashFiles('tsconfig.json') != '' }}
        run: pnpm exec tsc --noEmit

      - name: Test
        run: pnpm test --if-present

      - name: Build
        env:
          # Non-placeholder string so lib/env.ts validation passes in CI.
          # Real project IDs are set in hosting/deployment secrets, not here.
          NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID || 'ci-build-placeholder' }}
        run: pnpm build --if-present
